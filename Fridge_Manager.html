<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fridge Manager</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Malgun Gothic', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #E2E8F0;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    a { color: #2563EB; text-decoration: none; }
    a:hover { color: #1D4ED8; }
    button { font-family: inherit; cursor: pointer; }
    input, select { font-family: inherit; }

    .phone {
      width: 390px;
      height: 844px;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #F8FAFC;
      overflow: hidden;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 12px solid #1a1a1a;
    }

    .scr {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .scr::-webkit-scrollbar {
      width: 6px;
    }
    .scr::-webkit-scrollbar-track {
      background: transparent;
    }
    .scr::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 3px;
    }

    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Header */
    .header {
      padding: 22px 16px 14px;
      background: #FFFFFF;
      border-bottom: 1px solid #E2E8F0;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header-group-name {
      font-size: 12px;
      color: #64748B;
      line-height: 1.4;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #0F172A;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .avatar-group {
      display: flex;
      align-items: center;
      padding-top: 2px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      border: 2px solid #fff;
      margin-left: -9px;
    }

    .avatar:first-child {
      margin-left: 0;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      pointer-events: none;
      color: #94A3B8;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      background: #F8FAFC;
      font-size: 14px;
      color: #0F172A;
      outline: none;
    }

    .search-input:focus {
      border-color: #2563EB;
      background: #fff;
    }

    /* Summary cards */
    .summary-row {
      padding: 16px 16px 4px;
      display: flex;
      gap: 8px;
    }

    .summary-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 10px;
      border-radius: 8px;
      border: 1px solid;
      background: #fff;
      text-align: left;
      transition: all 0.2s;
    }

    .summary-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .summary-label {
      font-size: 12px;
      color: #64748B;
      font-weight: 600;
    }

    .summary-count-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: none;
    }

    .summary-count {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    /* Location chips */
    .chiprow {
      padding: 12px 16px 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
    }

    .chiprow::-webkit-scrollbar {
      display: none;
    }

    .chip {
      padding: 7px 15px;
      border-radius: 999px;
      border: 1px solid;
      background: #fff;
      color: #64748B;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      flex: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      transform: translateY(-1px);
    }

    .chip.active {
      background: #2563EB;
      color: #fff;
      border-color: #2563EB;
    }

    /* Food grid */
    .food-grid {
      padding: 0 16px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .food-card {
      border: 1px solid #E2E8F0;
      background: #FFFFFF;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.07);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .food-card.emphasis-card-border {
      border: 1px solid #E2E8F0;
      background: #FFFFFF;
      box-shadow: none;
    }

    .food-card.emphasis-card-left-border {
      border: 1px solid;
      border-left: 4px solid;
    }

    .food-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .category-badge {
      font-size: 11px;
      font-weight: 600;
      color: #64748B;
      background: #F1F5F9;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .food-name {
      font-size: 16px;
      font-weight: 700;
      color: #0F172A;
      line-height: 1.3;
    }

    .food-product {
      font-size: 12px;
      color: #94A3B8;
      line-height: 1.3;
    }

    .status-badge {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .food-divider {
      border-top: 1px solid #F1F5F9;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .food-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748B;
    }

    .food-info-label {
      font-weight: 600;
      color: #475569;
    }

    .info-divider {
      color: #CBD5E1;
    }

    /* Empty state */
    .empty-state {
      padding: 40px 24px 60px;
      text-align: center;
      color: #94A3B8;
    }

    .empty-state-title {
      font-size: 14px;
      font-weight: 600;
      color: #64748B;
    }

    .empty-state-desc {
      font-size: 13px;
      margin-top: 6px;
    }

    /* Tab bar */
    .tabbar {
      height: 64px;
      flex: none;
      background: #fff;
      border-top: 1px solid #E2E8F0;
      display: flex;
      align-items: stretch;
      z-index: 10;
    }

    .tab-button {
      flex: 1;
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #94A3B8;
      cursor: pointer;
      transition: color 0.2s;
    }

    .tab-button.active {
      color: #2563EB;
    }

    .tab-icon {
      width: 22px;
      height: 22px;
    }

    .tab-label {
      font-size: 11px;
      font-weight: 600;
    }

    /* FAB */
    .fab {
      position: absolute;
      right: 16px;
      bottom: 80px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #2563EB;
      border: none;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .fab:hover {
      transform: scale(1.05);
    }

    .fab:active {
      transform: scale(0.95);
    }

    .fab svg {
      width: 24px;
      height: 24px;
      color: #fff;
    }

    /* Modals */
    .modal-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      animation: fadeIn 0.18s ease;
    }

    .modal-bg {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      animation: fadeIn 0.18s ease;
    }

    .modal-sheet {
      position: relative;
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px 16px 24px;
      animation: sheetUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92%;
      overflow-y: auto;
      z-index: 1;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: #E2E8F0;
      margin: 0 auto 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 16px;
    }

    .form-group {
      display: block;
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      font-size: 14px;
      color: #0F172A;
      outline: none;
      background: #fff;
    }

    .form-input:focus {
      border-color: #2563EB;
      background: #fff;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .form-row > div {
      flex: 1;
    }

    .form-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .form-chip {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      background: #fff;
      color: #64748B;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .form-chip.active {
      background: rgba(37, 99, 235, 0.08);
      color: #2563EB;
      border-color: #2563EB;
    }

    .form-actions {
      display: flex;
      gap: 10px;
    }

    .btn-secondary {
      flex: 1;
      padding: 13px;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      background: #fff;
      color: #64748B;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: #F8FAFC;
    }

    .btn-primary {
      flex: 2;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: #2563EB;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1D4ED8;
    }

    .btn-primary:disabled {
      background: #93C5FD;
      cursor: not-allowed;
    }

    /* Family Tab */
    .family-container {
      padding: 16px;
    }

    .group-card {
      background: #2563EB;
      border-radius: 8px;
      padding: 18px 16px;
      color: #fff;
    }

    .group-label {
      font-size: 12px;
      opacity: 0.85;
    }

    .group-title {
      font-size: 18px;
      font-weight: 700;
      margin-top: 3px;
    }

    .group-code-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.22);
    }

    .group-code-info {
      font-size: 11px;
      opacity: 0.85;
    }

    .group-code {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-top: 2px;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.24);
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #0F172A;
      margin: 22px 4px 10px;
    }

    .member-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .member-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .member-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex: none;
    }

    .member-info {
      flex: 1;
      min-width: 0;
    }

    .member-name-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .member-name {
      font-size: 15px;
      font-weight: 700;
      color: #0F172A;
    }

    .member-role {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
    }

    .member-stats {
      font-size: 12px;
      color: #64748B;
      margin-top: 4px;
    }

    .invite-btn {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      border-radius: 8px;
      border: 1px dashed #CBD5E1;
      background: #fff;
      color: #2563EB;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .invite-btn:hover {
      background: #F8FAFC;
    }

    /* Profile Tab */
    .profile-container {
      padding: 16px;
    }

    .profile-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      flex: none;
      background: #64748B;
    }

    .profile-info {
      min-width: 0;
    }

    .profile-name {
      font-size: 17px;
      font-weight: 700;
      color: #0F172A;
    }

    .profile-email {
      font-size: 13px;
      color: #64748B;
      margin-top: 3px;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .stat-card {
      flex: 1;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #0F172A;
    }

    .stat-label {
      font-size: 11px;
      color: #64748B;
      margin-top: 3px;
    }

    .stat-card .stat-value.warning {
      color: #F59E0B;
    }

    .stat-card .stat-value.error {
      color: #DC2626;
    }

    .toggle-switch {
      width: 44px;
      height: 26px;
      border-radius: 999px;
      background: #E2E8F0;
      border: none;
      position: relative;
      flex: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .toggle-switch.active {
      background: #2563EB;
    }

    .toggle-switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      transition: left 0.15s;
    }

    .toggle-switch.active .toggle-switch-thumb {
      left: 21px;
    }

    .notif-item {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid #F1F5F9;
    }

    .notif-item:first-child {
      border-top: none;
    }

    .notif-text {
      min-width: 0;
    }

    .notif-label {
      font-size: 14px;
      font-weight: 600;
      color: #0F172A;
    }

    .notif-desc {
      font-size: 12px;
      color: #64748B;
      margin-top: 2px;
    }

    .account-actions {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      overflow: hidden;
    }

    .account-btn {
      width: 100%;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: #0F172A;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .account-btn:hover {
      background: #F8FAFC;
    }

    .account-btn.danger {
      color: #DC2626;
      border-top: 1px solid #F1F5F9;
    }

    .account-btn-arrow {
      color: #CBD5E1;
      font-size: 18px;
    }

    /* Hide tabs */
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="phone">
    <!-- ===================== FRIDGE ===================== -->
    <div id="fridge-tab" class="scr">
      <div class="header">
        <div class="header-top">
          <div>
            <div class="header-group-name">그룹명</div>
            <div class="header-title">NH 냉장고</div>
          </div>
          <div class="avatar-group">
            <div class="avatar" style="background: #2563EB;">엄</div>
            <div class="avatar" style="background: #0EA5E9;">아</div>
            <div class="avatar" style="background: #64748B;">민</div>
          </div>
        </div>
        <div class="search-container">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
          <input id="search-input" class="search-input" type="text" placeholder="음식 이름 검색">
        </div>
      </div>

      <div class="summary-row">
        <button id="summary-expired" class="summary-card" style="border-color: #E2E8F0;">
          <span class="summary-label">경과</span>
          <div class="summary-count-row">
            <div class="status-dot" style="background: #DC2626;"></div>
            <span class="summary-count" style="color: #DC2626;">0</span>
          </div>
        </button>
        <button id="summary-imminent" class="summary-card" style="border-color: #E2E8F0;">
          <span class="summary-label">임박</span>
          <div class="summary-count-row">
            <div class="status-dot" style="background: #F59E0B;"></div>
            <span class="summary-count" style="color: #F59E0B;">0</span>
          </div>
        </button>
        <button id="summary-safe" class="summary-card" style="border-color: #E2E8F0;">
          <span class="summary-label">안전</span>
          <div class="summary-count-row">
            <div class="status-dot" style="background: #16A34A;"></div>
            <span class="summary-count" style="color: #16A34A;">0</span>
          </div>
        </button>
      </div>

      <div class="chiprow">
        <button class="chip active" data-loc="all">전체</button>
        <button class="chip" data-loc="냉장">냉장</button>
        <button class="chip" data-loc="냉동">냉동</button>
        <button class="chip" data-loc="실온">실온</button>
      </div>

      <div id="food-grid" class="food-grid"></div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-state-title">해당하는 음식이 없어요</div>
        <div class="empty-state-desc">필터나 검색어를 바꿔보세요</div>
      </div>
    </div>

    <!-- ===================== FAMILY ===================== -->
    <div id="family-tab" class="scr hidden">
      <div class="header">
        <div class="header-group-name">함께 쓰는 사람들</div>
        <div class="header-title">가족 그룹</div>
      </div>

      <div class="family-container">
        <div class="group-card">
          <div class="group-label">우리 그룹</div>
          <div class="group-title">김가네 냉장고</div>
          <div class="group-code-section">
            <div>
              <div class="group-code-info">초대 코드</div>
              <div class="group-code">KIM-4827</div>
            </div>
            <button class="copy-btn" onclick="navigator.clipboard.writeText('KIM-4827')">코드 복사</button>
          </div>
        </div>

        <div class="section-title">구성원 3명</div>
        <div class="member-list" id="member-list"></div>

        <button class="invite-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          가족 초대하기
        </button>
      </div>
    </div>

    <!-- ===================== PROFILE ===================== -->
    <div id="profile-tab" class="scr hidden">
      <div class="header">
        <div class="header-group-name">내 정보</div>
        <div class="header-title">프로필</div>
      </div>

      <div class="profile-container">
        <div class="profile-card">
          <div class="profile-avatar">민</div>
          <div class="profile-info">
            <div class="profile-name">김민지</div>
            <div class="profile-email">minji.kim@example.com</div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" id="my-total">0</div>
            <div class="stat-label">내가 등록</div>
          </div>
          <div class="stat-card">
            <div class="stat-value warning" id="my-imminent">0</div>
            <div class="stat-label">임박</div>
          </div>
          <div class="stat-card">
            <div class="stat-value error" id="my-expired">0</div>
            <div class="stat-label">경과</div>
          </div>
        </div>

        <div class="section-title">알림 설정</div>
        <div class="account-actions" id="notif-list"></div>

        <div class="section-title">계정</div>
        <div class="account-actions">
          <button class="account-btn">
            가족 그룹 관리
            <span class="account-btn-arrow">›</span>
          </button>
          <button class="account-btn danger">
            로그아웃
            <span class="account-btn-arrow">›</span>
          </button>
        </div>
        <div style="height: 20px;"></div>
      </div>
    </div>

    <!-- ===================== FAB ===================== -->
    <button id="fab-btn" class="fab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>

    <!-- ===================== TAB BAR ===================== -->
    <div class="tabbar">
      <button id="tab-fridge" class="tab-button active">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="6" y="3" width="12" height="18" rx="2"></rect>
          <line x1="6" y1="10" x2="18" y2="10"></line>
          <line x1="9" y1="6" x2="9" y2="7.5"></line>
          <line x1="9" y1="13" x2="9" y2="15"></line>
        </svg>
        <span class="tab-label">냉장고</span>
      </button>
      <button id="tab-family" class="tab-button">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="8.5" r="3.2"></circle>
          <circle cx="16.5" cy="9.5" r="2.4"></circle>
          <path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"></path>
          <path d="M15 14.2c2.2.2 4 1.9 4 4.8"></path>
        </svg>
        <span class="tab-label">가족</span>
      </button>
      <button id="tab-profile" class="tab-button">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="3.6"></circle>
          <path d="M5 20c0-3.9 3.1-6.5 7-6.5s7 2.6 7 6.5"></path>
        </svg>
        <span class="tab-label">프로필</span>
      </button>
    </div>
  </div>

  <!-- ===================== ADD MODAL ===================== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-bg" class="modal-bg"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">음식 추가</div>

      <div class="form-group">
        <label class="form-label">이름</label>
        <input id="form-name" class="form-input" type="text" placeholder="예: 우유">
      </div>

      <div class="form-group">
        <label class="form-label">제품명</label>
        <input id="form-product" class="form-input" type="text" placeholder="예: 서울우유 1L">
      </div>

      <div class="form-row">
        <div>
          <label class="form-label">카테고리</label>
          <select id="form-cat" class="form-input">
            <option>채소</option>
            <option>과일</option>
            <option>육류</option>
            <option>유제품</option>
            <option>수산</option>
            <option>기타</option>
          </select>
        </div>
        <div>
          <label class="form-label">수량</label>
          <input id="form-qty" class="form-input" type="text" placeholder="예: 1팩">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">보관 위치</label>
        <div class="form-chips">
          <button class="form-chip active" data-loc="냉장">냉장</button>
          <button class="form-chip" data-loc="냉동">냉동</button>
          <button class="form-chip" data-loc="실온">실온</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">소비기한</label>
        <input id="form-expiry" class="form-input" type="date" value="2026-07-15">
      </div>

      <div class="form-actions">
        <button class="btn-secondary" id="form-cancel">취소</button>
        <button class="btn-primary" id="form-submit">추가하기</button>
      </div>
    </div>
  </div>

  <script>
    class FridgeManager {
      constructor() {
        this.TODAY = new Date(2026, 6, 8);
        this.memberColors = { '엄마': '#2563EB', '아빠': '#0EA5E9', '나': '#64748B' };
        this.statusColors = { '경과': '#DC2626', '임박': '#F59E0B', '안전': '#16A34A' };
        this.statusBgs = { '경과': 'rgba(220,38,38,.10)', '임박': 'rgba(245,158,11,.12)', '안전': 'rgba(22,163,74,.10)' };

        this.state = {
          tab: 'fridge',
          loc: 'all',
          status: 'all',
          q: '',
          showAdd: false,
          form: { name: '', product: '', cat: '채소', loc: '냉장', qty: '', expiry: '2026-07-15' },
          notif: { expiry: true, today: true, shared: false },
          foods: [
            { id: 1, name: '우유', product: '서울우유 1L', cat: '유제품', loc: '냉장', qty: '1팩', member: '엄마', expiry: '2026-07-10', start: '7/3' },
            { id: 2, name: '계란', product: '풀무원 유정란', cat: '유제품', loc: '냉장', qty: '10구', member: '아빠', expiry: '2026-07-20', start: '7/1' },
            { id: 3, name: '시금치', product: '국산 시금치', cat: '채소', loc: '냉장', qty: '1단', member: '엄마', expiry: '2026-07-07', start: '6/28' },
            { id: 4, name: '삼겹살', product: '하이포크 삼겹살', cat: '육류', loc: '냉동', qty: '600g', member: '아빠', expiry: '2026-08-01', start: '6/20' },
            { id: 5, name: '두부', product: '풀무원 국산콩두부', cat: '유제품', loc: '냉장', qty: '2모', member: '나', expiry: '2026-07-09', start: '7/5' },
            { id: 6, name: '딸기', product: '논산 설향딸기', cat: '과일', loc: '냉장', qty: '1팩', member: '나', expiry: '2026-07-08', start: '7/4' },
            { id: 7, name: '당근', product: '무농약 당근', cat: '채소', loc: '냉장', qty: '5개', member: '엄마', expiry: '2026-07-16', start: '7/2' },
            { id: 8, name: '닭가슴살', product: '하림 닭가슴살', cat: '육류', loc: '냉동', qty: '1kg', member: '아빠', expiry: '2026-08-07', start: '6/15' },
            { id: 9, name: '요거트', product: '그릭요거트 플레인', cat: '유제품', loc: '냉장', qty: '4개', member: '나', expiry: '2026-07-13', start: '7/1' },
            { id: 10, name: '김치', product: '종가집 포기김치', cat: '채소', loc: '냉장', qty: '1통', member: '엄마', expiry: '2026-08-22', start: '5/10' },
            { id: 11, name: '사과', product: '청송 부사', cat: '과일', loc: '실온', qty: '6개', member: '아빠', expiry: '2026-07-05', start: '6/25' },
            { id: 12, name: '만두', product: '비비고 왕교자', cat: '육류', loc: '냉동', qty: '1봉', member: '나', expiry: '2026-09-06', start: '6/10' },
          ],
        };

        this.init();
      }

      init() {
        this.bindEvents();
        this.render();
      }

      bindEvents() {
        // Tab navigation
        document.getElementById('tab-fridge').addEventListener('click', () => this.setTab('fridge'));
        document.getElementById('tab-family').addEventListener('click', () => this.setTab('family'));
        document.getElementById('tab-profile').addEventListener('click', () => this.setTab('profile'));

        // Search
        document.getElementById('search-input').addEventListener('input', (e) => {
          this.state.q = e.target.value;
          this.render();
        });

        // Location chips
        document.querySelectorAll('.chiprow .chip').forEach(btn => {
          btn.addEventListener('click', () => {
            this.state.loc = btn.dataset.loc;
            this.render();
          });
        });

        // Summary cards
        document.getElementById('summary-expired').addEventListener('click', () => {
          this.state.status = this.state.status === '경과' ? 'all' : '경과';
          this.render();
        });
        document.getElementById('summary-imminent').addEventListener('click', () => {
          this.state.status = this.state.status === '임박' ? 'all' : '임박';
          this.render();
        });
        document.getElementById('summary-safe').addEventListener('click', () => {
          this.state.status = this.state.status === '안전' ? 'all' : '안전';
          this.render();
        });

        // FAB
        document.getElementById('fab-btn').addEventListener('click', () => this.openAdd());

        // Modal
        document.getElementById('form-cancel').addEventListener('click', () => this.closeAdd());
        document.getElementById('modal-bg').addEventListener('click', () => this.closeAdd());
        document.getElementById('form-submit').addEventListener('click', () => this.submitAdd());

        // Form location chips
        document.querySelectorAll('.form-chips .form-chip').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.form-chips .form-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.state.form.loc = btn.dataset.loc;
          });
        });

        // Form inputs
        document.getElementById('form-name').addEventListener('input', (e) => {
          this.state.form.name = e.target.value;
          this.updateSubmitBtn();
        });
        document.getElementById('form-product').addEventListener('input', (e) => {
          this.state.form.product = e.target.value;
        });
        document.getElementById('form-cat').addEventListener('change', (e) => {
          this.state.form.cat = e.target.value;
        });
        document.getElementById('form-qty').addEventListener('input', (e) => {
          this.state.form.qty = e.target.value;
        });
        document.getElementById('form-expiry').addEventListener('change', (e) => {
          this.state.form.expiry = e.target.value;
        });
      }

      daysUntil(expiry) {
        const [y, m, d] = expiry.split('-').map(Number);
        return Math.round((new Date(y, m - 1, d) - this.TODAY) / 86400000);
      }

      mdOf(expiry) {
        const [_, m, d] = expiry.split('-');
        return m + '/' + d;
      }

      statusFor(expiry) {
        const days = this.daysUntil(expiry);
        if (days < 0) {
          return { key: '경과', label: (-days) + '일 지남' };
        }
        if (days <= 3) {
          return { key: '임박', label: days === 0 ? '오늘까지' : days + '일 남음' };
        }
        return { key: '안전', label: days + '일 남음' };
      }

      setTab(tab) {
        this.state.tab = tab;
        document.querySelectorAll('[id$="-tab"]').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.remove('hidden');
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('fab-btn').classList.toggle('hidden', tab !== 'fridge');
      }

      openAdd() {
        this.state.showAdd = true;
        this.state.form = { name: '', product: '', cat: '채소', loc: '냉장', qty: '', expiry: '2026-07-15' };
        document.getElementById('modal-overlay').classList.remove('hidden');
        document.getElementById('form-name').focus();
        this.updateSubmitBtn();
      }

      closeAdd() {
        this.state.showAdd = false;
        document.getElementById('modal-overlay').classList.add('hidden');
      }

      updateSubmitBtn() {
        const btn = document.getElementById('form-submit');
        if (this.state.form.name.trim()) {
          btn.classList.remove('disabled');
          btn.disabled = false;
        } else {
          btn.disabled = true;
        }
      }

      submitAdd() {
        if (!this.state.form.name.trim()) return;
        const now = new Date();
        const newFood = {
          id: Date.now(),
          name: this.state.form.name.trim(),
          cat: this.state.form.cat,
          loc: this.state.form.loc,
          qty: this.state.form.qty.trim() || '1개',
          member: '나',
          expiry: this.state.form.expiry,
          product: this.state.form.product.trim() || '직접 등록',
          start: (now.getMonth() + 1) + '/' + now.getDate(),
        };
        this.state.foods.unshift(newFood);
        this.state.loc = 'all';
        this.state.status = 'all';
        this.state.q = '';
        this.closeAdd();
        this.render();
      }

      render() {
        this.renderFridge();
        this.renderFamily();
        this.renderProfile();
      }

      renderFridge() {
        const foods = this.state.foods;
        const filtered = foods.filter(f =>
          (this.state.loc === 'all' || f.loc === this.state.loc) &&
          (this.state.status === 'all' || this.statusFor(f.expiry).key === this.state.status) &&
          (this.state.q === '' || f.name.includes(this.state.q))
        );

        const counts = { '경과': 0, '임박': 0, '안전': 0 };
        foods.forEach(f => counts[this.statusFor(f.expiry).key]++);

        // Update summary counts
        document.querySelectorAll('.summary-count').forEach((el, i) => {
          const key = ['경과', '임박', '안전'][i];
          el.textContent = counts[key];
        });

        // Update location chip state
        document.querySelectorAll('.chiprow .chip').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.loc === this.state.loc);
        });

        // Update summary card state
        document.querySelectorAll('.summary-card').forEach((btn, i) => {
          const key = ['경과', '임박', '안전'][i];
          btn.style.borderColor = this.state.status === key ? this.statusColors[key] : '#E2E8F0';
          btn.style.background = this.state.status === key ? this.statusBgs[key] : '#fff';
        });

        // Render food grid
        const grid = document.getElementById('food-grid');
        grid.innerHTML = filtered.map(f => {
          const status = this.statusFor(f.expiry);
          return `
            <div class="food-card">
              <div class="food-card-header">
                <span class="category-badge">${f.cat}</span>
                <div class="status-dot" style="background: ${this.statusColors[status.key]};"></div>
              </div>
              <div class="food-name">${f.name}</div>
              <div class="food-product">${f.product}</div>
              <span class="status-badge" style="background: ${this.statusBgs[status.key]}; color: ${this.statusColors[status.key]};">
                <span class="status-dot" style="background: ${this.statusColors[status.key]};"></span>${status.label}
              </span>
              <div class="food-divider">
                <div class="food-info">
                  <span class="food-info-label">${f.loc}</span>
                  <span class="info-divider">·</span>
                  <span>${f.qty}</span>
                </div>
                <div class="food-info">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="5" width="16" height="16" rx="2"></rect>
                    <line x1="4" y1="9" x2="20" y2="9"></line>
                    <line x1="8" y1="3" x2="8" y2="6"></line>
                    <line x1="16" y1="3" x2="16" y2="6"></line>
                  </svg>
                  <span>보관 시작 ${f.start}</span>
                </div>
                <div class="food-info">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M12 7v5l3 2"></path>
                  </svg>
                  <span>소비기한 ${this.mdOf(f.expiry)}</span>
                </div>
                <div class="food-info">
                  <div class="member-avatar" style="width: 16px; height: 16px; background: ${this.memberColors[f.member]}; font-size: 9px;">${f.member[0]}</div>
                  <span>${f.member}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Show/hide empty state
        document.getElementById('empty-state').classList.toggle('hidden', filtered.length > 0);
      }

      renderFamily() {
        const foods = this.state.foods;
        const members = [
          { key: '엄마', name: '엄마', role: '관리자', color: '#2563EB', roleColor: '#2563EB', roleBg: 'rgba(37,99,235,.10)' },
          { key: '아빠', name: '아빠', role: '구성원', color: '#0EA5E9', roleColor: '#0369A1', roleBg: 'rgba(14,165,233,.12)' },
          { key: '나', name: '민지 (나)', role: '구성원', color: '#64748B', roleColor: '#475569', roleBg: '#F1F5F9' },
        ];

        const memberList = document.getElementById('member-list');
        memberList.innerHTML = members.map(m => {
          const items = foods.filter(f => f.member === m.key);
          const warn = items.filter(f => this.statusFor(f.expiry).key !== '안전').length;
          return `
            <div class="member-card">
              <div class="member-avatar" style="background: ${m.color};">${m.key === '나' ? '민' : m.key[0]}</div>
              <div class="member-info">
                <div class="member-name-row">
                  <span class="member-name">${m.name}</span>
                  <span class="member-role" style="color: ${m.roleColor}; background: ${m.roleBg};">${m.role}</span>
                </div>
                <div class="member-stats">등록 ${items.length}개 · 임박·경과 ${warn}개</div>
              </div>
            </div>
          `;
        }).join('');
      }

      renderProfile() {
        const foods = this.state.foods.filter(f => f.member === '나');
        const myTotal = foods.length;
        const myImminent = foods.filter(f => this.statusFor(f.expiry).key === '임박').length;
        const myExpired = foods.filter(f => this.statusFor(f.expiry).key === '경과').length;

        document.getElementById('my-total').textContent = myTotal;
        document.getElementById('my-imminent').textContent = myImminent;
        document.getElementById('my-expired').textContent = myExpired;

        const notifs = [
          { key: 'expiry', label: '소비기한 임박 알림', desc: 'D-3 이내 음식을 알려드려요' },
          { key: 'today', label: '오늘 만료 알림', desc: '오늘까지인 음식을 알려드려요' },
          { key: 'shared', label: '가족 공유 알림', desc: '가족이 음식을 추가하면 알려드려요' },
        ];

        const notifList = document.getElementById('notif-list');
        notifList.innerHTML = notifs.map((n, i) => {
          const on = this.state.notif[n.key];
          return `
            <div class="notif-item" style="border-top-color: ${i === 0 ? 'transparent' : '#F1F5F9'};">
              <div class="notif-text">
                <div class="notif-label">${n.label}</div>
                <div class="notif-desc">${n.desc}</div>
              </div>
              <button class="toggle-switch ${on ? 'active' : ''}" data-notif="${n.key}" style="background: ${on ? '#2563EB' : '#E2E8F0'};">
                <div class="toggle-switch-thumb" style="left: ${on ? '21px' : '3px'};"></div>
              </button>
            </div>
          `;
        }).join('');

        document.querySelectorAll('.toggle-switch').forEach(btn => {
          btn.addEventListener('click', () => {
            const key = btn.dataset.notif;
            this.state.notif[key] = !this.state.notif[key];
            this.renderProfile();
          });
        });
      }
    }

    // Initialize
    new FridgeManager();
  </script>
</body>
</html>
